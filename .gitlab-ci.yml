# Path in your repo: .gitlab-ci.yml
#
# Deploys files under dags/ to the GCS bucket used by Cloud Composer (or any
# Airflow DAGs bucket). Uses a service account JSON key stored as a masked,
# protected CI/CD variable.
#
# Required GitLab CI/CD variables (Settings > CI/CD > Variables):
#   GCP_SA_KEY    - base64-encoded service account JSON key
#                   (e.g. `base64 -i key.json | tr -d '\n'` then paste the value)
#                   Mark as: Protected = true, Masked = true, Type = Variable
#   DAGS_BUCKET   - your-composer-bucket-name (without gs:// prefix)

stages:
  - validate
  - deploy

variables:
  GIT_DEPTH: "1"

validate_dags:
  stage: validate
  image: python:3.11-slim
  rules:
    - changes:
        - dags/**/*
  script:
    - python -m py_compile dags/*.py
    - echo "DAG files compiled successfully."

deploy_dags:
  stage: deploy
  image: google/cloud-sdk:slim
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - dags/**/*
  before_script:
    - echo "$GCP_SA_KEY" | base64 -d > /tmp/gcp-key.json
    - gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
  script:
    - >
      gcloud storage rsync ./dags "gs://${DAGS_BUCKET}/dags"
      --recursive
      --delete-unmatched-destination-objects
    - gcloud storage ls "gs://${DAGS_BUCKET}/dags"
  after_script:
    - rm -f /tmp/gcp-key.json

# --- Alternative: Workload Identity Federation (no long-lived key) ---
