# Path in your repo: .github/workflows/deploy-dags.yml
#
# Deploys files under dags/ to the GCS bucket used by Cloud Composer (or any
# Airflow DAGs bucket). Uses Workload Identity Federation (no long-lived keys).
#
# Required GitHub secrets:
#   WIF_PROVIDER   - full resource name of the Workload Identity Provider
#                    e.g. projects/123456789/locations/global/workloadIdentityPools/ci-pool/providers/github-provider
#   GCP_SA_EMAIL   - ci-dags-deployer@PROJECT_ID.iam.gserviceaccount.com
#   DAGS_BUCKET    - your-composer-bucket-name (without gs:// prefix)

name: Deploy DAGs to GCS

on:
  push:
    branches: [main]
    paths:
      - "dags/**"
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write   # required for Workload Identity Federation

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    environment: DAGS_CICD   # ต้องตรงกับชื่อ Environment ที่เก็บ secrets ไว้
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate DAG syntax
        run: |
          python -m py_compile dags/*.py
          echo "DAG files compiled successfully."

      - name: Remove local __pycache__ before sync
        run: find ./dags -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      # NOTE: --checksums-only is required here. actions/checkout@v4 does a fresh
      # clone every run, so every file gets a brand-new mtime (checkout time),
      # not the original commit time. By default, gcloud storage rsync compares
      # files using size + mtime, so it would see ALL files as "changed" every
      # single run (even ones you didn't touch) and re-upload everything.
      # --checksums-only forces rsync to compare actual file content hashes
      # instead, so only the files you really edited get uploaded.
      - name: Sync DAGs to bucket
        run: |
          gcloud storage rsync ./dags "gs://${{ secrets.DAGS_BUCKET }}" \
            --recursive \
            --delete-unmatched-destination-objects \
            --checksums-only \
            --exclude=".*__pycache__.*"

      - name: Show uploaded files
        run: gcloud storage ls "gs://${{ secrets.DAGS_BUCKET }}"

# --- Alternative auth block if you use a JSON key instead of WIF ---
# Replace the "Authenticate to Google Cloud" step above with:
#
#  - name: Authenticate to Google Cloud
#    uses: google-github-actions/auth@v2
#    with:
#      credentials_json: ${{ secrets.GCP_SA_KEY }}
#
# And drop the "permissions: id-token: write" block if you no longer need it.
